        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /chats/{chatId}/read:
    put:
      tags: [Chats]
      summary: Mark a chat as read or unread
      operationId: markChatAsRead
      parameters:
        - $ref: "#/components/parameters/XInstanceId"
        - $ref: "#/components/parameters/ChatIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMarkAsReadRequest"
      responses:
        "204":
          description: Read state updated
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/DeviceNotPaired"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /chats/{chatId}/messages:
    post:
      tags: [Chats]
      summary: Request on-demand message history
      description: |
        Triggers an on-demand history sync request for the given chat. The response arrives
        asynchronously as a `message_history_sync` event via the configured publisher.
      operationId: requestChatMessages
      parameters:
        - $ref: "#/components/parameters/XInstanceId"
        - $ref: "#/components/parameters/ChatIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestMessagesRequest"
            example:
              lastMessageId: "3EB0A0B0C1D2E3F4"
              lastMessageSenderId: "1234567890"
              count: 50
      responses:
        "202":
          description: History sync request accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/DeviceNotPaired"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /chats/{chatId}/clear:
    post:
      tags: [Chats]
      summary: Clear all messages from a chat
      operationId: clearChat
      parameters:
        - $ref: "#/components/parameters/XInstanceId"
        - $ref: "#/components/parameters/ChatIdPath"
      responses:
        "204":
          description: Chat cleared
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/DeviceNotPaired"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  # ─── Calls ─────────────────────────────────────────────────────────

  /calls/{callId}/reject:
    post:
      tags: [Calls]
      summary: Reject an incoming call
      operationId: rejectCall
      parameters:
        - $ref: "#/components/parameters/XInstanceId"
        - name: callId
          in: path
          required: true
          description: Call ID from the call event
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectCallRequest"
      responses:
        "204":
          description: Call rejected
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/DeviceNotPaired"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  # ─── Newsletters ──────────────────────────────────────────────────

  /newsletters:
    get:
      tags: [Newsletters]
      summary: List subscribed newsletters
      description: Returns all newsletters the current user is subscribed to.
      operationId: listNewsletters
      parameters:
        - $ref: "#/components/parameters/XInstanceId"
      responses:
        "200":
          description: List of newsletters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NewsletterInfoResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/DeviceNotPaired"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

    post:
      tags: [Newsletters]
      summary: Create a newsletter
      description: Create a new newsletter/channel with the specified name, description, and optional picture.
      operationId: createNewsletter
      parameters:
        - $ref: "#/components/parameters/XInstanceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNewsletterRequest"
            example:
              name: "My Newsletter"
              description: "Updates about cool stuff"
      responses:
        "201":
          $ref: "#/components/responses/Created"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/DeviceNotPaired"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /newsletters/invite/{code}:
    get:
      tags: [Newsletters]
      summary: Get newsletter info by invite code
      description: Look up newsletter information using an invite code.
      operationId: getNewsletterByInviteCode
      parameters:
        - $ref: "#/components/parameters/XInstanceId"
        - name: code
          in: path
          required: true
          description: Newsletter invite code
          schema:
            type: string
      responses:
        "200":
          description: Newsletter info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsletterInfoResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/DeviceNotPaired"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /newsletters/{id}:
    get:
      tags: [Newsletters]
      summary: Get newsletter info
      description: Retrieve detailed information about a specific newsletter.
      operationId: getNewsletter
      parameters:
        - $ref: "#/components/parameters/XInstanceId"
        - $ref: "#/components/parameters/NewsletterIdPath"
      responses:
        "200":
          description: Newsletter info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsletterInfoResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/DeviceNotPaired"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /newsletters/{id}/subscription:
    put:
      tags: [Newsletters]
      summary: Subscribe or unsubscribe from a newsletter
      description: Set the subscription state for a newsletter. Set `subscribed` to true to follow/subscribe, or false to unfollow/unsubscribe.
      operationId: setNewsletterSubscription
      parameters:
        - $ref: "#/components/parameters/XInstanceId"
        - $ref: "#/components/parameters/NewsletterIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetSubscriptionRequest"
            examples:
              subscribe:
                summary: Subscribe to newsletter
                value:
                  subscribed: true
              unsubscribe:
                summary: Unsubscribe from newsletter
                value:
                  subscribed: false
      responses:
        "204":
          description: Subscription state updated
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/DeviceNotPaired"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /newsletters/{id}/mute:
    put:
      tags: [Newsletters]
      summary: Mute or unmute a newsletter
      description: Toggle mute state for a newsletter. Muted newsletters do not send notifications.
      operationId: toggleMuteNewsletter
      parameters:
        - $ref: "#/components/parameters/XInstanceId"
        - $ref: "#/components/parameters/NewsletterIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToggleMuteNewsletterRequest"
            examples:
              mute:
                summary: Mute newsletter
                value:
                  mute: true
              unmute:
                summary: Unmute newsletter
                value:
                  mute: false
      responses:
        "204":
          description: Mute state updated
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/DeviceNotPaired"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  # ─── Status ──────────────────────────────────────────────────────

  /status/privacy:
    get:
      tags: [Status]
      summary: Get status privacy settings
      description: Returns the status broadcast privacy settings for the logged-in account.
      operationId: getStatusPrivacy
      parameters:
        - $ref: "#/components/parameters/XInstanceId"
      responses:
        "200":
          description: Status privacy settings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StatusPrivacyResponse"
              example:
                - type: contacts
                  list: []
                  isDefault: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/DeviceNotPaired"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /status/text:
    post:
      tags: [Status]
      summary: Post a text status
      description: Post a text status update (story) visible to your contacts.
      operationId: postTextStatus
      parameters:
        - $ref: "#/components/parameters/XInstanceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostTextStatusRequest"
            example:
              text: "Hello from WSAPI!"
      responses:
        "201":
          $ref: "#/components/responses/Created"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/DeviceNotPaired"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /status/image:
    post:
      tags: [Status]
      summary: Post an image status
      description: Post an image status update (story) via URL or base64-encoded data.
      operationId: postImageStatus
      parameters:
        - $ref: "#/components/parameters/XInstanceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostMediaStatusRequest"
            examples:
              byURL:
                summary: Image status by URL
                value:
                  url: "https://example.com/photo.jpg"
                  mimeType: "image/jpeg"
                  caption: "Beautiful sunset"
              byBase64:
                summary: Image status by base64
                value:
                  data: "/9j/4AAQSkZJRgABAQ..."
                  mimeType: "image/png"
      responses:
        "201":
          $ref: "#/components/responses/Created"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/DeviceNotPaired"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /status/video:
    post:
      tags: [Status]
      summary: Post a video status
      description: Post a video status update (story) via URL or base64-encoded data.
      operationId: postVideoStatus
      parameters:
        - $ref: "#/components/parameters/XInstanceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostMediaStatusRequest"
            examples:
              byURL:
                summary: Video status by URL
                value:
                  url: "https://example.com/clip.mp4"
                  mimeType: "video/mp4"
                  caption: "Check this out"
              byBase64:
                summary: Video status by base64
                value:
                  data: "AAAAGGZ0eXBtcDQy..."
                  mimeType: "video/mp4"
      responses:
        "201":
          $ref: "#/components/responses/Created"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/DeviceNotPaired"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /status/{messageId}/delete:
    post:
      tags: [Status]
      summary: Delete a status update
      description: Delete (revoke) a previously posted status update so it is no longer visible to your contacts.
      operationId: deleteStatus
      parameters:
        - $ref: "#/components/parameters/XInstanceId"
        - $ref: "#/components/parameters/MessageIdPath"
      responses:
        "204":
          description: Status deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/DeviceNotPaired"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-Api-Key
      description: >-
        Instance or customer-level API key. Either the instance's own API key
        or the customer's API key is accepted. Must be paired with the
        X-Instance-Id header to identify the target instance.

  parameters:
    XInstanceId:
      name: X-Instance-Id
      in: header
      required: true
      description: The ID of the WhatsApp instance to use
      schema:
        type: string
        default: "{{instanceId}}"

    MessageIdPath:
      name: messageId
      in: path
      required: true
      description: Message ID
      schema:
        type: string

    GroupIdPath:
      name: id
      in: path
      required: true
      description: Group JID
      schema:
        type: string

    CommunityIdPath:
      name: id
      in: path
      required: true
      description: Community JID
      schema:
        type: string

    NewsletterIdPath:
      name: id
      in: path
      required: true
      description: Newsletter JID
      schema:
        type: string

    ChatIdPath:
      name: chatId
      in: path
      required: true
      description: Chat JID (user or group)
      schema:
        type: string

    PhonePath:
      name: phone
      in: path
      required: true
      description: Phone number (e.g. 1234567890)
      schema:
        type: string
        pattern: '^\+?\d{7,15}$'

  responses:
    Created:
      description: Resource created
      content:
        application/json:
          schema:
            type: object
            properties:
              id:
                type: string
                description: ID of the created resource
          example:
            id: "01234567890123456"

    OK:
      description: Success
      content:
        application/json:
          schema:
            type: object
            properties:
              id:
                type: string
                description: ID of the resource
          example:
            id: "01234567890123456"

    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            status: 400
            detail: "invalid request body"

    Unauthorized:
      description: Authentication failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            status: 401
            detail: "unauthorized"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            status: 404
            detail: "not found"

    ServiceUnavailable:
      description: Instance not available (not connected or service is nil)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            status: 503
            detail: "instance not available"

    DeviceNotPaired:
      description: Device is not paired. Complete the pairing process first.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            status: 403
            detail: "device not paired"

  schemas:
    Error:
      type: object
      description: Standard error response returned by all API endpoints
      required: [detail, status]
      properties:
        detail:
          type: string
          description: Human-readable error message
          example: "invalid request body"
        status:
          type: integer
          description: HTTP status code
          example: 400

    # ─── Session Schemas ───────────────────────────────────────────

    SessionStatus:
      type: object
      properties:
        isConnected:
          type: boolean
        isLoggedIn:
          type: boolean
        deviceId:
          type: string

    # ─── Message Schemas ───────────────────────────────────────────

    SendTextRequest:
      type: object
      required: [to, text]
      properties:
        to:
          type: string
          description: Recipient JID (user or group)
        text:
          type: string
          description: Message text
        mentions:
          type: array
          items:
            type: string
          description: JIDs of mentioned users
        replyTo:
          type: string
          description: Message ID to reply to
        replyToSenderId:
          type: string
          description: Sender JID of the message being replied to
        isForwarded:
          type: boolean
          description: Mark message as forwarded
        ephemeralExpiration:
          type: string
          enum: [off, 24h, 7d, 90d]
          description: Disappearing message timer

    SendMediaRequest:
      type: object
      required: [to]
      properties:
        to:
          type: string
          description: Recipient JID
        data:
          type: string
          description: Base64-encoded file data (mutually exclusive with `url`)
        url:
          type: string
          format: uri
          description: URL to download the media from (mutually exclusive with `data`, max 50 MB)
        mimeType:
          type: string
          description: MIME type of the file (auto-detected if omitted)
        caption:
          type: string
          description: Media caption
        mentions:
          type: array
          items:
            type: string
        replyTo:
          type: string
        replyToSenderId:
          type: string
        isForwarded:
          type: boolean
        viewOnce:
          type: boolean
          description: Send as view-once media
        ephemeralExpiration:
          type: string
          enum: [off, 24h, 7d, 90d]

    SendDocumentRequest:
      allOf:
        - $ref: "#/components/schemas/SendMediaRequest"
        - type: object
          required: [filename]
          properties:
            filename:
              type: string
              description: Filename shown to the recipient

    SendStickerRequest:
      type: object
      required: [to]
      properties:
        to:
          type: string
        data:
          type: string
          description: Base64-encoded sticker data (WebP, mutually exclusive with `url`)
        url:
          type: string
          format: uri
          description: URL to download the sticker from (mutually exclusive with `data`, max 50 MB)
        isAnimated:
          type: boolean
        mentions:
          type: array
          items:
            type: string
        replyTo:
          type: string
        replyToSenderId:
          type: string
        isForwarded:
          type: boolean
        ephemeralExpiration:
          type: string
          enum: [off, 24h, 7d, 90d]

    SendContactRequest:
      type: object
      required: [to]
      properties:
        to:
          type: string
        displayName:
          type: string
          description: Contact display name
        vcard:
          type: string
          description: vCard string
        mentions:
          type: array
          items:
            type: string
        replyTo:
          type: string
        replyToSenderId:
          type: string
        isForwarded:
          type: boolean
        ephemeralExpiration:
          type: string
          enum: [off, 24h, 7d, 90d]

    SendLocationRequest:
      type: object
      required: [to]
      properties:
        to:
          type: string
        latitude:
          type: number
          format: double
          minimum: -90
          maximum: 90
        longitude:
          type: number
          format: double
          minimum: -180
          maximum: 180
        name:
          type: string
          description: Location name
        address:
          type: string
          description: Location address
        url:
          type: string
          description: Location URL
        ephemeralExpiration:
          type: string
          enum: [off, 24h, 7d, 90d]

    SendLinkRequest:
      type: object
      required: [to, text, url]
      properties:
        to:
          type: string
        text:
          type: string
          description: Message text accompanying the link
        url:
          type: string
          format: uri
          description: URL to preview
        title:
          type: string
          description: Link preview title
        description:
          type: string
          description: Link preview description
        jpegThumbnail:
          type: string
          description: Base64-encoded JPEG thumbnail for preview
        mentions:
          type: array
          items:
            type: string
        replyTo:
          type: string
        replyToSenderId:
          type: string
        isForwarded:
          type: boolean
        ephemeralExpiration:
          type: string
          enum: [off, 24h, 7d, 90d]

    SendReactionRequest:
      type: object
      required: [to, reaction]
      properties:
        to:
          type: string
          description: Chat JID where the message is
        senderId:
          type: string
          description: Sender of the original message (for group messages)
        reaction:
          type: string
          description: Emoji reaction character. Send an empty string to remove a previous reaction.

    EditMessageRequest:
      type: object
      required: [to, text]
      properties:
        to:
          type: string
          description: Chat JID
        text:
          type: string
          description: New message text
        mentions:
          type: array
          items:
            type: string
        ephemeralExpiration:
          type: string
          enum: [off, 24h, 7d, 90d]

    MarkAsReadRequest:
      type: object
      required: [chatId, senderId, receiptType]
      properties:
        chatId:
          type: string
          description: Chat JID
        senderId:
          type: string
          description: Sender JID
        receiptType:
          type: string
          enum: [delivered, sender, read, played]

    StarMessageRequest:
      type: object
      required: [chatId, senderId]
      properties:
        chatId:
          type: string
        senderId:
          type: string
        starred:
          type: boolean
          description: True to star, false to unstar

    DeleteMessageRequest:
      type: object
      required: [chatId, senderId]
      properties:
        chatId:
          type: string
        senderId:
          type: string

    DeleteMessageForMeRequest:
      type: object
      required: [chatId]
      properties:
        chatId:
          type: string
        senderId:
          type: string
        isFromMe:
          type: boolean
        timestamp:
          type: string
          format: date-time

    PinMessageRequest:
      type: object
      required: [chatId, senderId]
      properties:
        chatId:
          type: string
          description: Chat JID
        senderId:
          type: string
          description: Sender JID of the message to pin
        pinned:
          type: boolean
          description: True to pin, false to unpin
        pinExpiration:
          type: string
          description: Pin expiration duration (e.g. 24h, 7d, 30d)

    # ─── Group Schemas ─────────────────────────────────────────────

    CreateGroupRequest:
      type: object
      required: [name, participants]
      properties:
        name:
          type: string
        participants:
          type: array
          items:
            type: string
          minItems: 1
          description: List of participant JIDs

    UpdateParticipantsRequest:
      type: object
      required: [participants, action]
      properties:
        participants:
          type: array
          items:
            type: string
          minItems: 1
        action:
          type: string
          enum: [add, remove, promote, demote]

    SetNameRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string

    SetDescriptionRequest:
      type: object
      properties:
        description:
          type: string

    SetPictureRequest:
      type: object
      required: [data]
      properties:
        data:
          type: string
          description: Base64-encoded JPEG image

    SetBoolRequest:
      type: object
      properties:
        enabled:
          type: boolean

    SetMemberAddModeRequest:
      type: object
      properties:
        onlyAdminAdd:
          type: boolean

    JoinWithLinkRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          description: Invite link code (e.g. "abc123" from https://chat.whatsapp.com/abc123)

    JoinWithInviteRequest:
      type: object
      required: [groupId, inviterId, code]
      properties:
        groupId:
          type: string
        inviterId:
          type: string
        code:
          type: string
        expiration:
          type: integer
          format: int64

    UpdateRequestsRequest:
      type: object
      required: [participants, action]
      properties:
        participants:
          type: array
          items:
            type: string
          minItems: 1
        action:
          type: string
          enum: [approve, reject]

    # ─── Community Schemas ─────────────────────────────────────────

    CreateCommunityRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        participants:
          type: array
          items:
            type: string
        approvalMode:
          type: string
          description: Join approval mode

    CreateCommunityGroupRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        participants:
          type: array
          items:
            type: string

    LinkGroupRequest:
      type: object
      required: [groupId]
      properties:
        groupId:
          type: string
          description: JID of the group to link

    # ─── Chat Schemas ───────────────────────────────────────────

    ChatListItem:
      type: object
      properties:
        id:
          type: string
          description: Chat JID
          example: "1234567890@s.whatsapp.net"
        lid:
          type: string
          description: LID-based JID for the chat (omitted for groups or if unknown)
          example: "222424242@lid"
        isGroup:
          type: boolean
        isArchived:
          type: boolean
        isPinned:
          type: boolean
        isMuted:
          type: boolean
        muteEndTime:
          type: string
          format: date-time
          description: When the mute expires (omitted if not muted)
        pushName:
          type: string
          description: Contact push name (omitted if unknown)
        businessName:
          type: string
          description: Business name (omitted if not a business)
        fullName:
          type: string
          description: Full name from contacts (omitted if unknown)
        lastActivity:
          type: string
          format: date-time
          description: Timestamp of last activity (omitted if unknown)

    ChatPictureResponse:
      type: object
      properties:
        pictureId:
          type: string
        pictureUrl:
          type: string

    BusinessProfileResponse:
      type: object
      properties:
        id:
          type: string
        address:
          type: string
        email:
          type: string
        description:
          type: string
        website:
          type: string
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        memberSince:
          type: string
        categories:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
        businessHours:
          type: array
          items:
            type: object
            properties:
              dayOfWeek:
                type: string
              mode:
                type: string
              openTime:
                type: string
              closeTime:
                type: string
        businessHoursTimeZone:
          type: string
        profileOptions:
          type: object
          additionalProperties:
            type: string

    SetPresenceRequest:
      type: object
      required: [state]
      properties:
        state:
          type: string
          enum: [typing, paused, recording]

    SetChatEphemeralRequest:
      type: object
      required: [expiration]
      properties:
        expiration:
          type: string
          enum: [off, 24h, 7d, 90d]
          description: Disappearing messages timer

    MuteChatRequest:
      type: object
      required: [duration]
      properties:
        duration:
          type: string
          enum: [8h, 1w, always, off]

    PinChatRequest:
      type: object
      properties:
        pinned:
          type: boolean

    ArchiveChatRequest:
      type: object
      properties:
        archived:
          type: boolean

    ChatMarkAsReadRequest:
      type: object
      properties:
        read:
          type: boolean

    RequestMessagesRequest:
      type: object
      required: [lastMessageId, lastMessageSenderId]
      properties:
        lastMessageId:
          type: string
          description: ID of the last known message in the chat
        lastMessageSenderId:
          type: string
          description: Phone number or JID of the sender of the last known message
        count:
          type: integer
          description: Number of messages to request (default 50, max 500)
          minimum: 1
          maximum: 500
          default: 50

    # ─── Contact Schemas ─────────────────────────────────────────

    CreateContactRequest:
      type: object
      required: [id, fullName]
      properties:
        id:
          type: string
          description: Phone number or JID of the contact
        fullName:
          type: string
          description: Full name of the contact
        firstName:
          type: string
          description: First name of the contact (optional)

    # ─── User Profile Schemas ────────────────────────────────────────

    UpdateProfileRequest:
      type: object
      properties:
        name:
          type: string
          description: Display name
        status:
          type: string
          description: Status text
        picture:
          type: string
          description: Base64-encoded JPEG profile picture

    SetMyPresenceRequest:
      type: object
      required: [presence]
      properties:
        presence:
          type: string
          enum: [available, unavailable]
          description: Presence state

    # ─── Call Schemas ──────────────────────────────────────────────

    # ─── Identity Schemas ────────────────────────────────────────

    Identity:
      type: object
      description: >
        Represents a WhatsApp user with all known identifiers. The `id` field
        is always present: it prefers a phone-based JID, falling back to LID.
      properties:
        id:
          type: string
          description: Primary identifier (phone-based JID preferred, LID fallback)
          example: "1234567890@s.whatsapp.net"
        lid:
          type: string
          description: LID-based JID (omitted if unknown)
          example: "222424242@lid"
        phone:
          type: string
          description: Phone number without prefix (omitted if unknown)
          example: "1234567890"
        device:
          type: integer
          description: Device number (omitted if 0)
          example: 2

    Sender:
      allOf:
        - $ref: "#/components/schemas/Identity"
        - type: object
          properties:
            isMe:
              type: boolean
              description: Whether this sender is the logged-in account
              example: false

    GroupParticipant:
      allOf:
        - $ref: "#/components/schemas/Identity"
        - type: object
          properties:
            isAdmin:
              type: boolean
            isSuperAdmin:
              type: boolean
            displayName:
              type: string

    GroupInfoResponse:
      type: object
      properties:
        groupId:
          type: string
        owner:
          $ref: "#/components/schemas/Identity"
        name:
          type: string
        createdAt:
          type: string
          format: date-time
        description:
          type: string
        isAnnounce:
          type: boolean
        isLocked:
          type: boolean
        isEphemeral:
          type: boolean
        ephemeralExpiration:
          type: integer
          format: int64
        participants:
          type: array
          items:
            $ref: "#/components/schemas/GroupParticipant"
        communityId:
          type: string
        isAnnouncementGroup:
          type: boolean
        isJoinApprovalRequired:
          type: boolean
        memberAddMode:
          type: string

    GroupParticipantRequest:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/Identity"
        requestedAt:
          type: string
          format: date-time

    CommunitySubGroupResponse:
      type: object
      properties:
        groupId:
          type: string
          description: Group JID
        name:
          type: string
          description: Group name
        nameSetAt:
          type: string
          format: date-time
          description: When the group name was last set
        isAnnouncementGroup:
          type: boolean
          description: Whether this is the community's announcement group

    CommunityInfoResponse:
      type: object
      properties:
        communityId:
          type: string
        owner:
          $ref: "#/components/schemas/Identity"
        name:
          type: string
        created:
          type: string
          format: date-time
        description:
          type: string
        isLocked:
          type: boolean
        communityApprovalMode:
          type: string
        participants:
          type: array
          items:
            $ref: "#/components/schemas/GroupParticipant"

    ContactInfo:
      allOf:
        - $ref: "#/components/schemas/Identity"
        - type: object
          properties:
            fullName:
              type: string
            firstName:
              type: string
            pushName:
              type: string
            businessName:
              type: string
            inPhoneAddressBook:
              type: boolean

    UserInfo:
      allOf:
        - $ref: "#/components/schemas/Identity"
        - type: object
          properties:
            isInWhatsApp:
              type: boolean
            status:
              type: string
            pictureId:
              type: string
            pictureUrl:
              type: string
              description: Profile picture URL (omitted if unavailable)
            isVerified:
              type: boolean

    UserMeInfo:
      allOf:
        - $ref: "#/components/schemas/Identity"
        - type: object
          properties:
            deviceId:
              type: integer
            pushName:
              type: string
            businessName:
              type: string
            status:
              type: string
            pictureId:
              type: string
            isVerified:
              type: boolean

    RejectCallRequest:
      type: object
      required: [callerId]
      properties:
        callerId:
          type: string
          description: JID of the caller

    # ─── Bulk Check Schemas ─────────────────────────────────────────

    BulkCheckRequest:
      type: object
      required: [phones]
      properties:
        phones:
          type: array
          items:
            type: string
          minItems: 1
          description: List of phone numbers to check

    BulkCheckResult:
      type: object
      properties:
        query:
          type: string
          description: The phone number that was queried
        isInWhatsApp:
          type: boolean
          description: Whether the phone number is registered on WhatsApp
        jid:
          type: string
          description: JID of the user (only present if registered)

    # ─── Privacy Schemas ──────────────────────────────────────────

    SetPrivacyRequest:
      type: object
      required: [setting, value]
      properties:
        setting:
          type: string
          enum: [groupadd, last, status, profile, readreceipts, online, calladd]
          description: The privacy setting to update
        value:
          type: string
          enum: [all, contacts, contact_blacklist, match_last_seen, known, none]
          description: The privacy level to set

    PrivacySettingsResponse:
      type: object
      properties:
        groupAdd:
          type: string
          description: Who can add you to groups
        lastSeen:
          type: string
          description: Who can see your last seen
        status:
          type: string
          description: Who can see your status
        profile:
          type: string
          description: Who can see your profile picture
        readReceipts:
          type: string
          description: Whether read receipts are enabled
        online:
          type: string
          description: Who can see when you are online
        callAdd:
          type: string
          description: Who can call you

    # ─── Newsletter Schemas ─────────────────────────────────────────

    CreateNewsletterRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          description: Newsletter name
        description:
          type: string
          description: Newsletter description
        picture:
          type: string
          description: Base64-encoded profile picture for the newsletter

    SetSubscriptionRequest:
      type: object
      required: [subscribed]
      properties:
        subscribed:
          type: boolean
          description: True to subscribe, false to unsubscribe

    ToggleMuteNewsletterRequest:
      type: object
      properties:
        mute:
          type: boolean
          description: True to mute, false to unmute

    NewsletterInfoResponse:
      type: object
      properties:
        id:
          type: string
          description: Newsletter JID
        name:
          type: string
          description: Newsletter name
        description:
          type: string
          description: Newsletter description
        subscriberCount:
          type: integer
          description: Number of subscribers
        verificationState:
          type: string
          description: Verification state of the newsletter
        pictureUrl:
          type: string
          description: Profile picture URL
        inviteCode:
          type: string
          description: Invite code for the newsletter
        role:
          type: string
          description: Current user's role in the newsletter
        mute:
          type: string
          description: Mute state for the current user
        state:
          type: string
          description: Newsletter state
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp

    # ─── Status Schemas ─────────────────────────────────────────────

    PostTextStatusRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string
          description: Status text content

    PostMediaStatusRequest:
      type: object
      properties:
        data:
          type: string
          description: Base64-encoded media data (mutually exclusive with `url`)
        url:
          type: string
          format: uri
          description: URL to download the media from (mutually exclusive with `data`, max 50 MB)
        mimeType:
          type: string
          description: MIME type of the media
        caption:
          type: string
          description: Media caption

    StatusPrivacyResponse:
      type: object
      properties:
        type:
          type: string
          enum: [contacts, blacklist, whitelist]
          description: Privacy setting type
        list:
          type: array
          items:
            type: string
          description: List of JIDs included in the privacy setting
        isDefault:
          type: boolean
          description: Whether this is the default privacy setting
